# Phantom C2 — Redirector-Optimized Profile
# Use this when operating behind a redirector (Nginx/Caddy/Cloudflare)
#
# Key features:
# - Host header validation (only accepts traffic from your domain)
# - Multiple URIs for rotation (harder to fingerprint)
# - Realistic server headers (matches common web frameworks)
# - Decoy response for scanners/bots

profile:
  name: "redirector"
  description: "Optimized for use behind a reverse proxy redirector"

  # ── Host Validation ──
  # CRITICAL: Only accept traffic with these Host headers.
  # All other requests get the decoy response.
  # Update these with your actual redirector domain!
  allowed_hosts:
    - "updates.yourdomain.com"
    - "cdn.yourdomain.com"
    - "*.yourdomain.com"

  # ── Client (Agent → Server) ──
  client:
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"

    # Multiple URIs — agent picks randomly per request
    register_uris:
      - "/api/v2/session/init"
      - "/api/v2/auth/token"
      - "/connect/authorize"

    checkin_uris:
      - "/api/v2/telemetry/report"
      - "/api/v2/status/heartbeat"
      - "/api/v2/metrics/collect"
      - "/api/v2/health/check"

    method: "POST"
    data_transform: "body"

    headers:
      Accept: "application/json"
      Accept-Language: "en-US,en;q=0.9"
      Accept-Encoding: "gzip, deflate, br"
      Cache-Control: "no-cache"
      X-Requested-With: "XMLHttpRequest"

  # ── Server (Server → Agent) ──
  server:
    status_code: 200
    content_type: "application/json; charset=utf-8"
    data_transform: "body"

    headers:
      Server: "nginx/1.24.0"
      X-Content-Type-Options: "nosniff"
      X-Frame-Options: "DENY"
      Strict-Transport-Security: "max-age=31536000; includeSubDomains"
      Cache-Control: "no-store, no-cache, must-revalidate"
      Vary: "Accept-Encoding"

    # Make response look like a JSON API
    prepend: '{"status":"ok","data":"'
    append: '","version":"2.1.0"}'

  # ── Decoy (non-C2 visitors see this) ──
  decoy:
    status_code: 200
    content_type: "text/html; charset=utf-8"
    headers:
      Server: "nginx/1.24.0"
      X-Content-Type-Options: "nosniff"
    body: |
      <!DOCTYPE html>
      <html>
      <head><title>Service Status</title></head>
      <body>
      <h1>Service Status</h1>
      <p>All systems operational.</p>
      <p><small>Last checked: {{timestamp}}</small></p>
      </body>
      </html>

    # Or redirect to a real website instead:
    # redirect_url: "https://www.microsoft.com"
